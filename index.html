<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant Booking Form</title>
<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container">
    <h2>Restaurant Booking Form</h2>

    <label>Choice of Booking</label>
    <select id="bookingType">
        <option value="">Select</option>
        <option value="full">Full Day Booking</option>
        <option value="half">Half Day Booking</option>
        <option value="hour">Hourly Booking</option>
    </select>

    <div id="formContainer"></div>

</div>

<script src="script.js"></script>

</body>
</html>
